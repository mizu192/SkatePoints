<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>構成</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>構成シミュレーター</h1>

<div style="border: 1px solid #999; padding: 15px; margin-bottom: 20px;">
  <h3>要素を追加</h3>
  <!-- 単発 or コンビネーション選択 -->
  <div style="margin-bottom: 15px;">
    <label><input type="radio" name="jumpType" value="single" checked onclick="switchJumpType('single')"> 単発</label>
    <label><input type="radio" name="jumpType" value="combination" onclick="switchJumpType('combination')"> コンビネーション</label>
  </div>

  <!-- 単発用セレクトボックス -->
  <div id="singleJumpDiv">
    <label for="element">要素を選択: </label>
    <select id="element" style="width: 300px;">
  <optgroup label="1回転ジャンプ">
    <option data-base="1.1">1A</option>
    <option data-base="0.6">1Lz</option>
    <option data-base="0.5">1F</option>
    <option data-base="0.5">1Lo</option>
    <option data-base="0.4">1S</option>
    <option data-base="0.4">1T</option>
  </optgroup>
  <optgroup label="2回転ジャンプ">
    <option data-base="3.3">2A</option>
    <option data-base="2.1">2Lz</option>
    <option data-base="1.8">2F</option>
    <option data-base="1.7">2Lo</option>
    <option data-base="1.3">2S</option>
    <option data-base="1.3">2T</option>
  </optgroup>
  <optgroup label="3回転ジャンプ">
    <option data-base="8.0">3A</option>
    <option data-base="5.9">3Lz</option>
    <option data-base="5.3">3F</option>
    <option data-base="4.9">3Lo</option>
    <option data-base="4.3">3S</option>
    <option data-base="4.2">3T</option>
  </optgroup>
  <optgroup label="アップライトスピン（USp）">
    <option data-base="1.0">USp B</option>
    <option data-base="1.2">USp 1</option>
    <option data-base="1.5">USp 2</option>
    <option data-base="1.9">USp 3</option>
    <option data-base="2.4">USp 4</option>
  </optgroup>
  <optgroup label="レイバックスピン（LSp）">
    <option data-base="1.2">LSp B</option>
    <option data-base="1.5">LSp 1</option>
    <option data-base="1.9">LSp 2</option>
    <option data-base="2.4">LSp 3</option>
    <option data-base="2.7">LSp 4</option>
  </optgroup>
  <optgroup label="キャメルスピン（CSp）">
    <option data-base="1.1">CSp B</option>
    <option data-base="1.4">CSp 1</option>
    <option data-base="1.8">CSp 2</option>
    <option data-base="2.3">CSp 3</option>
    <option data-base="2.6">CSp 4</option>
  </optgroup>
  <optgroup label="シットスピン（SSp）">
    <option data-base="1.1">SSp B</option>
    <option data-base="1.3">SSp 1</option>
    <option data-base="1.6">SSp 2</option>
    <option data-base="2.1">SSp 3</option>
    <option data-base="2.5">SSp 4</option>
  </optgroup>
  <optgroup label="フライングアップライトスピン（FUSp）">
    <option data-base="1.5">FUSp B</option>
    <option data-base="1.7">FUSp 1</option>
    <option data-base="2.0">FUSp 2</option>
    <option data-base="2.4">FUSp 3</option>
    <option data-base="2.9">FUSp 4</option>
  </optgroup>
  <optgroup label="フライングレイバックスピン（FLSp）">
    <option data-base="1.7">FLSp B</option>
    <option data-base="2.0">FLSp 1</option>
    <option data-base="2.4">FLSp 2</option>
    <option data-base="2.9">FLSp 3</option>
    <option data-base="3.2">FLSp 4</option>
  </optgroup>
  <optgroup label="フライングキャメルスピン（FCSp）">
    <option data-base="1.6">FCSp B</option>
    <option data-base="1.9">FCSp 1</option>
    <option data-base="2.3">FCSp 2</option>
    <option data-base="2.8">FCSp 3</option>
    <option data-base="3.2">FCSp 4</option>
  </optgroup>
  <optgroup label="フライングシットスピン（FSSp）">
    <option data-base="1.7">FSSp B</option>
    <option data-base="2.0">FSSp 1</option>
    <option data-base="2.3">FSSp 2</option>
    <option data-base="2.6">FSSp 3</option>
    <option data-base="3.0">FSSp 4</option>
  </optgroup>
  <optgroup label="足替えアップライトスピン（CUSp）">
    <option data-base="1.5">CUSp B</option>
    <option data-base="1.7">CUSp 1</option>
    <option data-base="2.0">CUSp 2</option>
    <option data-base="2.4">CUSp 3</option>
    <option data-base="2.9">CUSp 4</option>
  </optgroup>
  <optgroup label="足替えレイバックスピン（CLSp）">
    <option data-base="1.7">CLSp B</option>
    <option data-base="2.0">CLSp 1</option>
    <option data-base="2.4">CLSp 2</option>
    <option data-base="2.9">CLSp 3</option>
    <option data-base="3.2">CLSp 4</option>
  </optgroup>
  <optgroup label="足替えキャメルスピン（CCsp）">
    <option data-base="1.7">CCsp B</option>
    <option data-base="2.0">CCsp 1</option>
    <option data-base="2.3">CCsp 2</option>
    <option data-base="2.8">CCsp 3</option>
    <option data-base="3.2">CCsp 4</option>
  </optgroup>
  <optgroup label="足替えシットスピン（CSSp）">
    <option data-base="1.6">CSSp B</option>
    <option data-base="1.9">CSSp 1</option>
    <option data-base="2.3">CSSp 2</option>
    <option data-base="2.6">CSSp 3</option>
    <option data-base="3.0">CSSp 4</option>
  </optgroup>
  <optgroup label="コンビネーションスピン（CoSp）">
    <option data-base="1.5">CoSp B</option>
    <option data-base="1.7">CoSp 1</option>
    <option data-base="2.0">CoSp 2</option>
    <option data-base="2.5">CoSp 3</option>
    <option data-base="3.0">CoSp 4</option>
  </optgroup>
  <optgroup label="フライングコンビネーションスピン（FCoSp）">
    <option data-base="1.5">FCoSp B</option>
    <option data-base="1.7">FCoSp 1</option>
    <option data-base="2.0">FCoSp 2</option>
    <option data-base="2.5">FCoSp 3</option>
    <option data-base="3.0">FCoSp 4</option>
  </optgroup>
  <optgroup label="足替えコンビネーションスピン（CCoSp）">
    <option data-base="1.7">CCoSp B</option>
    <option data-base="2.0">CCoSp 1</option>
    <option data-base="2.5">CCoSp 2</option>
    <option data-base="3.0">CCoSp 3</option>
    <option data-base="3.5">CCoSp 4</option>
  </optgroup>
  <optgroup label="足替えフライングコンビネーションスピン（FCCoSp）">
    <option data-base="1.7">FCCoSp B</option>
    <option data-base="2.0">FCCoSp 1</option>
    <option data-base="2.5">FCCoSp 2</option>
    <option data-base="3.0">FCCoSp 3</option>
    <option data-base="3.5">FCCoSp 4</option>
  </optgroup>
  <optgroup label="ステップシーケンス（StSq）">
    <option data-base="1.5">StSq B</option>
    <option data-base="1.8">StSq 1</option>
    <option data-base="2.6">StSq 2</option>
    <option data-base="3.3">StSq 3</option>
    <option data-base="3.9">StSq 4</option>
  </optgroup>
  <optgroup label="コレオシーケンス（ChSq）">
    <option data-base="3.0">ChSq</option>
  </optgroup>
</select>
  </div>

  <!-- コンビネーション用セレクトボックス -->
  <div id="combinationDiv" style="display: none;">
    <p>ジャンプを最大3個まで選択してください：</p>
    <label for="comboJump1">ジャンプ1: </label>
    <select id="comboJump1" style="width: 300px;">
      <option value="">選択なし</option>
      <optgroup label="1回転ジャンプ">
        <option data-base="1.1">1A</option>
        <option data-base="0.6">1Lz</option>
        <option data-base="0.5">1F</option>
        <option data-base="0.5">1Lo</option>
        <option data-base="0.5">1Eu</option>
        <option data-base="0.4">1S</option>
        <option data-base="0.4">1T</option>
      </optgroup>
      <optgroup label="2回転ジャンプ">
        <option data-base="3.3">2A</option>
        <option data-base="2.1">2Lz</option>
        <option data-base="1.8">2F</option>
        <option data-base="1.7">2Lo</option>
        <option data-base="1.3">2S</option>
        <option data-base="1.3">2T</option>
      </optgroup>
      <optgroup label="3回転ジャンプ">
        <option data-base="8.0">3A</option>
        <option data-base="5.9">3Lz</option>
        <option data-base="5.3">3F</option>
        <option data-base="4.9">3Lo</option>
        <option data-base="4.3">3S</option>
        <option data-base="4.2">3T</option>
      </optgroup>
    </select>

    <br><br>
    <label for="comboJump2">ジャンプ2（オプション）: </label>
    <select id="comboJump2" style="width: 300px;">
      <option value="">選択なし</option>
      <optgroup label="1回転ジャンプ">
        <option data-base="1.1">1A</option>
        <option data-base="0.6">1Lz</option>
        <option data-base="0.5">1F</option>
        <option data-base="0.5">1Lo</option>
        <option data-base="0.5">1Eu</option>
        <option data-base="0.4">1S</option>
        <option data-base="0.4">1T</option>
      </optgroup>
      <optgroup label="2回転ジャンプ">
        <option data-base="3.3">2A</option>
        <option data-base="2.1">2Lz</option>
        <option data-base="1.8">2F</option>
        <option data-base="1.7">2Lo</option>
        <option data-base="1.3">2S</option>
        <option data-base="1.3">2T</option>
      </optgroup>
      <optgroup label="3回転ジャンプ">
        <option data-base="8.0">3A</option>
        <option data-base="5.9">3Lz</option>
        <option data-base="5.3">3F</option>
        <option data-base="4.9">3Lo</option>
        <option data-base="4.3">3S</option>
        <option data-base="4.2">3T</option>
      </optgroup>
    </select>

    <br><br>
    <label for="comboJump3">ジャンプ3（オプション）: </label>
    <select id="comboJump3" style="width: 300px;">
      <option value="">選択なし</option>
      <optgroup label="1回転ジャンプ">
        <option data-base="1.1">1A</option>
        <option data-base="0.6">1Lz</option>
        <option data-base="0.5">1F</option>
        <option data-base="0.5">1Lo</option>
        <option data-base="0.5">1Eu</option>
        <option data-base="0.4">1S</option>
        <option data-base="0.4">1T</option>
      </optgroup>
      <optgroup label="2回転ジャンプ">
        <option data-base="3.3">2A</option>
        <option data-base="2.1">2Lz</option>
        <option data-base="1.8">2F</option>
        <option data-base="1.7">2Lo</option>
        <option data-base="1.3">2S</option>
        <option data-base="1.3">2T</option>
      </optgroup>
      <optgroup label="3回転ジャンプ">
        <option data-base="8.0">3A</option>
        <option data-base="5.9">3Lz</option>
        <option data-base="5.3">3F</option>
        <option data-base="4.9">3Lo</option>
        <option data-base="4.3">3S</option>
        <option data-base="4.2">3T</option>
      </optgroup>
    </select>
  </div>
  <br><br>

  <label for="goe">GOE (-5～+5): </label>
  <input id="goe" type="number" min="-5" max="5" value="0" style="width: 60px;">

  <button onclick="addElement()">追加</button>

  <ul id="elements"></ul>
</div>

<hr>

<h2>TES（Technical Element Score）</h2>
<h3>基礎点: <span id="total">0</span></h3>
<h3>GOE合計: <span id="goeTotal">0</span></h3>
<h3>合計: <span id="tesTotal">0</span></h3>

<hr>

<h2>PCS（Program Component Score）</h2>
<label for="componentsInput">Compositions: </label>
<input id="componentsInput" type="number" min="0" step="0.1" value="0" style="width: 80px;">

<label for="presentationInput">Presentations: </label>
<input id="presentationInput" type="number" min="0" step="0.1" value="0" style="width: 80px;">

<label for="skatingSkillsInput">Skating Skills: </label>
<input id="skatingSkillsInput" type="number" min="0" step="0.1" value="0" style="width: 80px;">

<br><br>
<label for="factorInput">PCSファクター: </label>
<select id="factorInput">
  <option value="1.2">1.2</option>
  <option value="1.5">1.5</option>
  <option value="1.8">1.8</option>
  <option value="2.66">2.66</option>
  <option value="3.33">3.33</option>
</select>

<h3>PCS合計: <span id="pcsTotalScore">0</span></h3>
<h3>PCS×ファクター: <span id="pcsTotal">0</span></h3>

<hr>

<h2 style="color: red;">総合得点: <span id="grandTotal">0</span></h2>

<script src="/static/script.js"></script>
</body>
</html>
